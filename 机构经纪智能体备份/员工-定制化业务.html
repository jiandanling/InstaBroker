<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>员工端-定制化业务</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background: #f5f5f5; }
    .card-shadow { box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
    .module-tag { cursor: pointer; transition: all 0.2s ease; user-select: none; }
    .module-tag:hover { transform: scale(1.02); }
    .module-tag.selected { background: linear-gradient(135deg, #7c3aed 0%, #6d28d9 100%); color: white; border-color: transparent; box-shadow: 0 2px 8px rgba(124, 58, 237, 0.3); }
    .step-panel { display: none; }
    .step-panel.active { display: block; }
    .fade-in { animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .loading-dots::after { content: ''; animation: dots 1.5s steps(4, end) infinite; }
    @keyframes dots { 0%, 20% { content: '.'; } 40% { content: '..'; } 60%, 100% { content: '...'; } }
  </style>
</head>
<body class="min-h-screen">
  <div class="min-h-screen flex flex-col max-w-lg mx-auto bg-[#f5f5f5]">
    <!-- 顶部导航栏 -->
    <header class="sticky top-0 bg-white px-4 py-3 flex items-center justify-between z-20 border-b border-gray-100">
      <a href="index.html" id="headerBack" class="w-10 h-10 flex items-center justify-center text-gray-700" aria-label="返回">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
        </svg>
      </a>
      <h1 class="text-lg font-semibold text-[#4f46e5]" id="headerTitle">定制化业务</h1>
      <button class="w-10 h-10 flex items-center justify-center text-gray-700" aria-label="通知">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
        </svg>
      </button>
    </header>

    <main class="flex-1 overflow-y-auto px-4 py-4">
      <!-- 步骤1：选择服务模块 -->
      <div id="stepSelect" class="step-panel active">
        <div class="text-xs text-[#64748B] text-center mb-4">根据客户的需求定制专属综合服务方案</div>

        <div class="bg-white rounded-2xl card-shadow p-4 mb-4">
          <div class="flex items-start gap-3">
            <div class="w-10 h-10 rounded-xl bg-[#f5f3ff] flex items-center justify-center flex-shrink-0">
              <svg class="w-5 h-5 text-[#7c3aed]" fill="currentColor" viewBox="0 0 20 20">
                <path d="M13 6a3 3 0 11-6 0 3 3 0 016 0zM18 8a2 2 0 11-4 0 2 2 0 014 0zM14 15a4 4 0 00-8 0v3h8v-3zM6 8a2 2 0 11-4 0 2 2 0 014 0zM16 18v-3a5.972 5.972 0 00-.75-2.906A3.005 3.005 0 0119 15v3h-3zM4.75 12.094A5.973 5.973 0 004 15v3H1v-3a3 3 0 013.75-2.906z"/>
              </svg>
            </div>
            <div>
              <div class="font-semibold text-[#1E293B] text-sm">专属综合服务方案</div>
              <div class="text-sm text-[#64748B] mt-1 leading-relaxed">涵盖代销、极速交易、两融、投研等多元化服务，根据客户资产规模、策略类型、风险偏好等维度，由智能体协同生成个性化方案。</div>
            </div>
          </div>
        </div>

        <div class="bg-white rounded-2xl card-shadow p-4 mb-4">
          <div class="font-semibold text-[#1E293B] text-sm mb-2">可定制服务模块 <span class="text-xs font-normal text-[#64748B]">（可多选）</span></div>
          <div class="flex flex-wrap gap-2" id="moduleList">
            <span class="module-tag px-3 py-1.5 rounded-full bg-[#f5f3ff] text-[#7c3aed] text-xs font-medium border border-purple-200" data-module="代销">代销</span>
            <span class="module-tag px-3 py-1.5 rounded-full bg-[#f5f3ff] text-[#7c3aed] text-xs font-medium border border-purple-200" data-module="极速交易">极速交易</span>
            <span class="module-tag px-3 py-1.5 rounded-full bg-[#f5f3ff] text-[#7c3aed] text-xs font-medium border border-purple-200" data-module="两融">两融</span>
            <span class="module-tag px-3 py-1.5 rounded-full bg-[#f5f3ff] text-[#7c3aed] text-xs font-medium border border-purple-200" data-module="投研">投研</span>
            <span class="module-tag px-3 py-1.5 rounded-full bg-[#f5f3ff] text-[#7c3aed] text-xs font-medium border border-purple-200" data-module="托管">托管</span>
            <span class="module-tag px-3 py-1.5 rounded-full bg-[#f5f3ff] text-[#7c3aed] text-xs font-medium border border-purple-200" data-module="算法交易">算法交易</span>
          </div>
        </div>

        <button id="btnApply" class="w-full py-4 bg-[#7c3aed] text-white rounded-2xl card-shadow text-center font-semibold text-sm hover:bg-[#6d28d9] transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
          发起定制化方案申请
        </button>
      </div>

      <!-- 步骤2：输入定制化需求 -->
      <div id="stepInput" class="step-panel">
        <div class="flex items-center gap-2 mb-4 text-sm text-[#64748B]">
          <a href="#" id="backToSelect" class="flex items-center gap-1 text-[#7c3aed] font-medium">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
            返回
          </a>
          <span>/</span>
          <span>填写客户定制化需求</span>
        </div>

        <div class="bg-white rounded-2xl card-shadow p-4 mb-4 fade-in">
          <div class="font-semibold text-[#1E293B] text-sm mb-3">已选服务模块</div>
          <div id="selectedModulesDisplay" class="flex flex-wrap gap-2 mb-4"></div>

          <div class="space-y-4">
            <div>
              <label class="block text-sm font-medium text-[#374151] mb-2">客户名称</label>
              <input type="text" id="clientName" class="w-full px-4 py-3 rounded-xl border border-gray-200 bg-gray-50 text-[#1E293B] text-sm placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-[#7c3aed]/30 focus:border-[#7c3aed]" placeholder="请输入客户名称（选填）" />
            </div>
            <div>
              <div class="flex items-center justify-between mb-2">
                <label class="text-sm font-medium text-[#374151]">定制化需求描述 <span class="text-red-500">*</span></label>
                <button type="button" id="btnFillReq" class="text-xs text-[#7c3aed] font-medium hover:text-[#6d28d9] flex items-center gap-1">
                  <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
                  模拟需求一键带入
                </button>
              </div>
              <textarea id="customReq" rows="5" class="w-full px-4 py-3 rounded-xl border border-gray-200 bg-gray-50 text-[#1E293B] text-sm placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-[#7c3aed]/30 focus:border-[#7c3aed] resize-none" placeholder="请详细描述客户的定制化需求，如：资产规模、策略类型、风险偏好、特殊要求等..."></textarea>
            </div>
          </div>
        </div>

        <button id="btnSubmit" class="w-full py-4 bg-[#7c3aed] text-white rounded-2xl card-shadow text-center font-semibold text-sm hover:bg-[#6d28d9] transition-colors">
          提交申请
        </button>
      </div>

      <!-- 步骤3：生成中（模拟加载） -->
      <div id="stepLoading" class="step-panel">
        <div class="flex flex-col items-center justify-center py-16 px-4">
          <div class="w-16 h-16 rounded-full bg-[#f5f3ff] flex items-center justify-center mb-4">
            <svg class="w-8 h-8 text-[#7c3aed] animate-pulse" fill="currentColor" viewBox="0 0 20 20">
              <path fill-rule="evenodd" d="M4 2a1 1 0 011 1v2.101a7.002 7.002 0 0111.601 2.566 1 1 0 11-1.885.666 5.002 5.002 0 00-8.716-1.832 1 1 0 01-1.832-.833 7.002 7.002 0 011.602-4.834V3a1 1 0 011-1zm4 12a3 3 0 100-6 3 3 0 000 6z" clip-rule="evenodd"/>
            </svg>
          </div>
          <div class="text-base font-medium text-[#1E293B]">公司自动驾驶大模型正在生成定制化综合服务方案</div>
          <div class="text-sm text-[#64748B] mt-1 loading-dots">请稍候</div>
        </div>
      </div>

      <!-- 步骤4：生成结果 - 定制化综合服务方案 -->
      <div id="stepResult" class="step-panel">
        <div class="flex items-center gap-2 mb-4 text-sm text-[#64748B]">
          <span class="text-[#059669] font-medium">✓ 方案已生成</span>
        </div>

        <div class="bg-white rounded-2xl card-shadow overflow-hidden mb-4">
          <div class="p-4 bg-gradient-to-r from-purple-50 to-blue-50 border-b border-gray-100">
            <div class="flex items-center gap-2">
              <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-[#7c3aed] to-[#6d28d9] flex items-center justify-center">
                <svg class="w-5 h-5 text-white" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M4 4a2 2 0 012-2h4.586A2 2 0 0112 2.586L15.414 6A2 2 0 0116 7.414V16a2 2 0 01-2 2H6a2 2 0 01-2-2V4zm2 6a1 1 0 011-1h6a1 1 0 110 2H7a1 1 0 01-1-1zm1 3a1 1 0 100 2h6a1 1 0 100-2H7z" clip-rule="evenodd"/></svg>
              </div>
              <div>
                <h2 class="font-bold text-[#1E293B] text-base">定制化综合服务方案</h2>
                <p id="resultClientName" class="text-xs text-[#64748B] mt-0.5">客户定制化需求已整合</p>
              </div>
            </div>
          </div>
          <div class="p-4 space-y-4">
            <div>
              <h3 class="font-semibold text-[#1E293B] text-sm mb-2">方案涵盖服务模块</h3>
              <div id="resultModules" class="flex flex-wrap gap-2"></div>
            </div>
            <div>
              <h3 class="font-semibold text-[#1E293B] text-sm mb-2">客户需求摘要</h3>
              <p id="resultReqSummary" class="text-sm text-[#64748B] leading-relaxed"></p>
            </div>
            <div class="bg-gray-50 rounded-xl p-4 space-y-3">
              <h3 class="font-semibold text-[#1E293B] text-sm">方案要点</h3>
              <ul id="resultPoints" class="space-y-2 text-sm text-[#374151]"></ul>
            </div>
            <div class="flex gap-3">
              <a href="#" id="btnDownload" class="flex-1 py-3 bg-[#7c3aed] text-white rounded-xl text-center font-medium text-sm hover:bg-[#6d28d9] transition-colors">
                下载方案文档
              </a>
              <button id="btnNewApply" class="flex-1 py-3 bg-gray-100 text-[#374151] rounded-xl font-medium text-sm hover:bg-gray-200 transition-colors">
                发起新申请
              </button>
            </div>
          </div>
        </div>
      </div>
    </main>

    <!-- 底部输入栏 -->
    <footer class="mt-auto w-full bg-white border-t border-gray-100 px-4 py-3 safe-area-inset-bottom">
      <div class="flex items-center gap-3 bg-gray-100 rounded-2xl px-4 py-3">
        <button class="flex-shrink-0 text-gray-500" aria-label="图片">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
          </svg>
        </button>
        <input type="text" class="flex-1 bg-transparent border-0 outline-none text-[#374151] placeholder-gray-400 text-base" placeholder="输入您的问题或选择智能体..." />
        <button class="flex-shrink-0 w-8 h-8 rounded-full bg-gray-300 flex items-center justify-center text-gray-600" aria-label="添加">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
          </svg>
        </button>
      </div>
    </footer>
  </div>

  <script>
    const MODULES = ['代销', '极速交易', '两融', '投研', '托管', '算法交易'];
    const selectedModules = new Set();

    // 模拟需求一键带入模板
    const SAMPLE_REQ = '资产管理规模约50亿，全天候量化策略。代表产品近三年收益稳定，最大回撤控制在8%以内。客户希望获得代销、极速交易、两融、投研等综合服务支持，对交易系统延迟和算法交易工具有较高要求。偏好低延迟PB系统，需申请TradeX极速交易及算法交易系统。';

    document.getElementById('btnFillReq').addEventListener('click', () => {
      document.getElementById('customReq').value = SAMPLE_REQ;
    });

    // 模块选择
    document.querySelectorAll('.module-tag').forEach(el => {
      el.addEventListener('click', () => {
        const m = el.dataset.module;
        if (selectedModules.has(m)) {
          selectedModules.delete(m);
          el.classList.remove('selected');
        } else {
          selectedModules.add(m);
          el.classList.add('selected');
        }
      });
    });

    function showStep(stepId) {
      document.querySelectorAll('.step-panel').forEach(p => p.classList.remove('active'));
      const panel = document.getElementById(stepId);
      if (panel) panel.classList.add('active');
    }

    function resetHeaderToHome() {
      const back = document.getElementById('headerBack');
      back.href = 'index.html';
      back.onclick = null;
      document.getElementById('headerTitle').textContent = '定制化业务';
    }

    function setHeaderBackToSelect() {
      const back = document.getElementById('headerBack');
      back.href = '#';
      back.onclick = (e) => { e.preventDefault(); showStep('stepSelect'); resetHeaderToHome(); };
    }

    // 发起申请 -> 输入需求
    document.getElementById('btnApply').addEventListener('click', () => {
      showStep('stepInput');
      document.getElementById('selectedModulesDisplay').innerHTML = selectedModules.size > 0
        ? [...selectedModules].map(m => `<span class="px-2.5 py-1 rounded-full bg-[#f5f3ff] text-[#7c3aed] text-xs font-medium">${m}</span>`).join('')
        : '<span class="text-xs text-[#64748B]">未选择（将生成全模块方案）</span>';
      document.getElementById('headerTitle').textContent = '填写定制化需求';
      setHeaderBackToSelect();
    });

    // 返回选择
    document.getElementById('backToSelect').addEventListener('click', (e) => {
      e.preventDefault();
      showStep('stepSelect');
      resetHeaderToHome();
    });

    // 提交申请 -> 模拟生成
    document.getElementById('btnSubmit').addEventListener('click', () => {
      const req = document.getElementById('customReq').value.trim();
      if (!req) {
        alert('请填写定制化需求描述');
        return;
      }
      showStep('stepLoading');
      document.getElementById('headerTitle').textContent = '生成中';

      setTimeout(() => {
        const clientName = document.getElementById('clientName').value.trim() || '客户';
        const modules = selectedModules.size > 0 ? [...selectedModules] : MODULES;

        document.getElementById('resultClientName').textContent = clientName + ' · 定制化综合服务方案';
        document.getElementById('resultModules').innerHTML = modules.map(m =>
          `<span class="px-2.5 py-1 rounded-full bg-[#ecfdf5] text-[#059669] text-xs font-medium">${m}</span>`
        ).join('');
        document.getElementById('resultReqSummary').textContent = req;

        const points = [
          '根据客户需求定制服务组合，优化资源配置',
          '提供专属客户经理对接，全程跟踪服务',
          '智能体已生成初步方案，可进一步细化沟通',
          '建议安排拜访时间，现场呈现并确认方案'
        ];
        document.getElementById('resultPoints').innerHTML = points.map(p => `<li class="flex items-start gap-2"><span class="text-[#7c3aed]">•</span>${p}</li>`).join('');

        showStep('stepResult');
        document.getElementById('headerTitle').textContent = '定制化方案';
        document.getElementById('headerBack').href = 'index.html';
        document.getElementById('headerBack').onclick = null;
      }, 2000);
    });

    // 发起新申请
    document.getElementById('btnNewApply').addEventListener('click', () => {
      selectedModules.clear();
      document.querySelectorAll('.module-tag').forEach(el => el.classList.remove('selected'));
      document.getElementById('clientName').value = '';
      document.getElementById('customReq').value = '';
      showStep('stepSelect');
      resetHeaderToHome();
    });

    // 下载（模拟，暂无实际下载）
    document.getElementById('btnDownload').addEventListener('click', (e) => {
      e.preventDefault();
    });
  </script>
</body>
</html>
