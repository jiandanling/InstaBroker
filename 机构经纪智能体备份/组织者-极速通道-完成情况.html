<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>极速交易通道延迟处置结果</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/common.css">
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background: #f8fafc; }
    .card-shadow { box-shadow: 0 4px 14px rgba(0,0,0,0.06); }
  </style>
</head>
<body class="min-h-screen">
  <div class="min-h-screen flex flex-col w-full max-w-5xl mx-auto bg-[#f8fafc]">

    <!-- 顶部导航栏 -->
    <header class="app-header sticky top-0 bg-white px-4 py-3.5 flex items-center justify-between z-20 border-b border-gray-200">
      <a id="backLink" href="组织者-应急组织.html" class="w-10 h-10 flex items-center justify-center text-gray-700">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
        </svg>
      </a>
      <h1 class="text-base font-semibold text-[#4f46e5]">应急处置完成情况</h1>
      <button class="w-10 h-10 flex items-center justify-center text-gray-700">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
        </svg>
      </button>
    </header>

    <main class="flex-1 overflow-auto px-4 py-4 pb-24 md:px-6 md:py-6 space-y-3">

      <!-- 概览卡片：已完成 -->
      <div class="bg-white rounded-2xl card-shadow p-4 space-y-3">
        <div class="flex items-center justify-between">
          <div>
            <p class="text-xs text-[#64748B] mb-0.5">上海分公司 · 前端发起</p>
            <h2 class="text-sm font-bold text-[#1E293B] leading-snug">极速交易通道延迟异常紧急处置</h2>
          </div>
          <span class="inline-flex items-center gap-1 text-xs font-medium text-[#059669] bg-emerald-50 border border-emerald-200 rounded-full px-2.5 py-1">
            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
            已完成
          </span>
        </div>
        <p class="text-xs text-[#9CA3AF]">应急处置时间：2小时前 · 已处置</p>
        <p class="text-sm text-[#4B5563] leading-relaxed">
          应急方案已执行完毕：启动技术、运维等部门联合排查，修复极速通道延迟问题，并完成对受影响量化客户的回访与解释。
        </p>
      </div>

      <!-- 简要处置说明 -->
      <div class="bg-white rounded-2xl card-shadow p-4 space-y-2">
        <p class="text-xs font-semibold text-[#1E293B]">处置结果摘要</p>
        <ul class="text-[11px] text-[#4B5563] space-y-1.5 list-disc list-inside">
          <li>极速通道延迟已恢复至正常水平（&lt;1ms）。</li>
          <li>确认问题源于单台通道服务器资源瓶颈，已完成扩容与参数优化。</li>
          <li>对受影响客户逐一回访说明原因及整改措施，客户整体表示理解。</li>
        </ul>
      </div>

    </main>

    <footer class="sticky bottom-0 bg-white border-t border-gray-200 px-4 py-3">
      <div class="flex items-center gap-3 bg-gray-100 rounded-2xl px-4 py-3">
        <button class="flex-shrink-0 text-gray-500" aria-label="图片">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
          </svg>
        </button>
        <input type="text" class="flex-1 bg-transparent border-0 outline-none text-[#374151] placeholder-gray-400 text-sm" placeholder="输入您的问题或选择智能体..." />
        <button class="flex-shrink-0 w-8 h-8 rounded-full bg-gray-300 flex items-center justify-center text-gray-600" aria-label="添加">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
          </svg>
        </button>
      </div>
    </footer>
  </div>

  <script>
    // 若从请示事项进入，则返回按钮回到请示事项，否则默认回到应急组织
    (function() {
      var back = document.getElementById('backLink');
      if (back && document.referrer && document.referrer.indexOf('请示事项') !== -1) {
        back.href = '组织者-请示事项.html';
      }
    })();
  </script>
</body>
</html>
