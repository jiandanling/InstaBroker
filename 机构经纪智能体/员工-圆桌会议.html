<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>员工端-圆桌会议</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/common.css">
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background: #f8fafc; }
    .card-shadow { box-shadow: 0 4px 14px rgba(0,0,0,0.06); }
  </style>
</head>
<body class="min-h-screen">
  <div class="min-h-screen flex flex-col w-full max-w-5xl mx-auto bg-[#f8fafc]">
    <!-- 顶部导航栏 -->
    <header class="app-header sticky top-0 bg-white px-4 py-3.5 flex items-center justify-between z-20 border-b border-gray-200">
      <a href="index.html" class="w-10 h-10 flex items-center justify-center text-gray-700" aria-label="返回">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
        </svg>
      </a>
      <h1 class="text-lg font-semibold text-[#4f46e5]">圆桌会议</h1>
      <button class="w-10 h-10 flex items-center justify-center text-gray-700" aria-label="通知">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
        </svg>
      </button>
    </header>

    <main class="flex-1 overflow-y-auto px-4 py-4 md:px-6 md:py-6">
      <!-- 说明卡片 -->
      <div class="bg-white rounded-2xl card-shadow p-4 mb-4">
        <div class="flex items-start gap-3">
          <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-emerald-400 to-teal-500 flex items-center justify-center flex-shrink-0">
            <svg class="w-5 h-5 text-white" fill="currentColor" viewBox="0 0 20 20">
              <path d="M13 6a3 3 0 11-6 0 3 3 0 016 0zM18 8a2 2 0 11-4 0 2 2 0 014 0zM14 15a4 4 0 00-8 0v3h8v-3zM6 8a2 2 0 11-4 0 2 2 0 014 0zM16 18v-3a5.972 5.972 0 00-.75-2.906A3.005 3.005 0 0119 15v3h-3zM4.75 12.094A5.973 5.973 0 004 15v3H1v-3a3 3 0 013.75-2.906z"/>
            </svg>
          </div>
          <div>
            <div class="font-semibold text-[#1E293B] text-sm">多智能体协同</div>
            <div class="text-sm text-[#64748B] mt-1 leading-relaxed">涉及多部门、多组织者智能体协同的业务，支持自动触发圆桌会议机制，向机构经纪组织者智能体发送请求，组织者智能体通过后，各方共同研判并形成处置意见。</div>
          </div>
        </div>
      </div>

      <!-- 会议列表 -->
      <div class="space-y-3">
        <div class="text-sm font-medium text-[#64748B] mb-2">近期会议</div>
        <a href="组织者-正赢投资-综合评估.html" class="block bg-white rounded-2xl card-shadow overflow-hidden hover:shadow-lg transition-shadow">
          <div class="p-4 flex items-center gap-4">
            <div class="w-12 h-12 rounded-xl bg-gradient-to-br from-emerald-500 to-teal-600 flex items-center justify-center flex-shrink-0 text-white font-bold text-sm">正</div>
            <div class="flex-1 min-w-0">
              <div class="font-semibold text-[#1E293B] text-sm">正赢投资 · 综合评估</div>
              <div class="text-xs text-[#64748B] mt-0.5">多组织者智能体协同 | 圆桌会议</div>
              <div class="flex flex-wrap gap-1.5 mt-2">
                <span class="px-2 py-0.5 rounded-full bg-[#f5f3ff] text-[#7c3aed] text-xs">圆桌协同</span>
              </div>
            </div>
            <svg class="w-5 h-5 text-[#94A3B8] flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
            </svg>
          </div>
        </a>

        <a href="组织者-灵均投资-风险处理.html" class="block bg-white rounded-2xl card-shadow overflow-hidden hover:shadow-lg transition-shadow">
          <div class="p-4 flex items-center gap-4">
            <div class="w-12 h-12 rounded-xl bg-gradient-to-br from-amber-500 to-orange-600 flex items-center justify-center flex-shrink-0 text-white font-bold text-sm">灵</div>
            <div class="flex-1 min-w-0">
              <div class="font-semibold text-[#1E293B] text-sm">灵均投资 · 风险处置</div>
              <div class="text-xs text-[#64748B] mt-0.5">创黔2号限制交易 | 请求发起圆桌会议</div>
              <div class="flex flex-wrap gap-1.5 mt-2">
                <span class="px-2 py-0.5 rounded-full bg-[#fef3c7] text-[#d97706] text-xs">风险处置</span>
              </div>
            </div>
            <svg class="w-5 h-5 text-[#94A3B8] flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
            </svg>
          </div>
        </a>

        <a href="组织者-博达富通-风险处理.html" class="block bg-white rounded-2xl card-shadow overflow-hidden hover:shadow-lg transition-shadow">
          <div class="p-4 flex items-center gap-4">
            <div class="w-12 h-12 rounded-xl bg-gradient-to-br from-blue-500 to-purple-600 flex items-center justify-center flex-shrink-0 text-white font-bold text-sm">博</div>
            <div class="flex-1 min-w-0">
              <div class="font-semibold text-[#1E293B] text-sm">北京博达富通基金 · 风险处置</div>
              <div class="text-xs text-[#64748B] mt-0.5">博达全天候2号限制交易 | 请求发起圆桌会议</div>
              <div class="flex flex-wrap gap-1.5 mt-2">
                <span class="px-2 py-0.5 rounded-full bg-[#fef3c7] text-[#d97706] text-xs">风险处置</span>
              </div>
            </div>
            <svg class="w-5 h-5 text-[#94A3B8] flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
            </svg>
          </div>
        </a>
      </div>
    </main>

    <!-- 底部输入栏 -->
    <footer class="mt-auto w-full bg-white border-t border-gray-200 px-4 py-3 safe-area-inset-bottom">
      <div class="flex items-center gap-3 bg-gray-100 rounded-2xl px-4 py-3">
        <button class="flex-shrink-0 text-gray-500" aria-label="图片">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
          </svg>
        </button>
        <input type="text" class="flex-1 bg-transparent border-0 outline-none text-[#374151] placeholder-gray-400 text-base" placeholder="输入您的问题或选择智能体..." />
        <button class="flex-shrink-0 w-8 h-8 rounded-full bg-gray-300 flex items-center justify-center text-gray-600" aria-label="添加">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
          </svg>
        </button>
      </div>
    </footer>
  </div>
</body>
</html>
