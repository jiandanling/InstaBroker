<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>员工端-金融机构经纪</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/common.css">
  <style>
    .card-shadow { box-shadow: 0 4px 14px rgba(0,0,0,0.06); }
  </style>
</head>
<body class="min-h-screen bg-[#f8fafc]">
  <div class="min-h-screen flex flex-col w-full max-w-5xl mx-auto bg-[#f8fafc]">
    <header class="app-header sticky top-0 bg-white px-4 py-3.5 flex items-center justify-between z-20 border-b border-gray-200">
      <a href="index.html" class="w-10 h-10 flex items-center justify-center text-gray-700" aria-label="返回">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
        </svg>
      </a>
      <h1 class="text-lg font-semibold text-emerald-600">金融机构经纪</h1>
      <button class="w-10 h-10 flex items-center justify-center text-gray-700" aria-label="通知">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
        </svg>
      </button>
    </header>

    <main class="flex-1 overflow-y-auto px-4 py-5 md:px-6 md:py-6">
      <h2 class="text-base font-semibold text-[#1e293b] mb-4 flex items-center gap-2">
        <span class="w-1 h-4 rounded-full bg-emerald-500"></span>
        业务入口
      </h2>
      <div class="text-xs text-[#64748B] text-center mb-5">公募基金 · 保险资管 · 银行理财 · 券商资管</div>

      <div class="space-y-3">
        <a href="员工-我的客户.html" class="block bg-white rounded-2xl card-shadow overflow-hidden hover:shadow-lg transition-shadow">
          <div class="p-4 flex items-center gap-4">
            <div class="w-12 h-12 rounded-xl bg-emerald-50 flex items-center justify-center flex-shrink-0">
              <svg class="w-6 h-6 text-emerald-600" fill="currentColor" viewBox="0 0 20 20">
                <path fill-rule="evenodd" d="M4 4a2 2 0 012-2h8a2 2 0 012 2v12a1 1 0 110 2h-3a1 1 0 01-1-1v-2a1 1 0 00-1-1H9a1 1 0 00-1 1v2a1 1 0 01-1 1H4a1 1 0 110-2V4zm3 1h2v2H7V5zm2 4H7v2h2V9zm2-4h2v2h-2V5zm2 4h-2v2h2V9z" clip-rule="evenodd"/>
              </svg>
            </div>
            <div class="flex-1 min-w-0">
              <div class="font-semibold text-[#1E293B] text-sm">金融机构客户</div>
              <div class="text-xs text-[#64748B] mt-0.5">公募基金、保险资管、银行理财、券商资管</div>
            </div>
            <svg class="w-5 h-5 text-[#94A3B8] flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
            </svg>
          </div>
        </a>

        <a href="员工-定制化业务.html" class="block bg-white rounded-2xl card-shadow overflow-hidden hover:shadow-lg transition-shadow">
          <div class="p-4 flex items-center gap-4">
            <div class="w-12 h-12 rounded-xl bg-emerald-50 flex items-center justify-center flex-shrink-0">
              <svg class="w-6 h-6 text-emerald-600" fill="currentColor" viewBox="0 0 20 20">
                <path d="M13 6a3 3 0 11-6 0 3 3 0 016 0zM18 8a2 2 0 11-4 0 2 2 0 014 0zM14 15a4 4 0 00-8 0v3h8v-3zM6 8a2 2 0 11-4 0 2 2 0 014 0zM16 18v-3a5.972 5.972 0 00-.75-2.906A3.005 3.005 0 0119 15v3h-3zM4.75 12.094A5.973 5.973 0 004 15v3H1v-3a3 3 0 013.75-2.906z"/>
              </svg>
            </div>
            <div class="flex-1 min-w-0">
              <div class="font-semibold text-[#1E293B] text-sm">综合服务方案</div>
              <div class="text-xs text-[#64748B] mt-0.5">机构专属综合服务方案定制</div>
            </div>
            <svg class="w-5 h-5 text-[#94A3B8] flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
            </svg>
          </div>
        </a>

        <a href="员工-标准化业务.html" class="block bg-white rounded-2xl card-shadow overflow-hidden hover:shadow-lg transition-shadow">
          <div class="p-4 flex items-center gap-4">
            <div class="w-12 h-12 rounded-xl bg-emerald-50 flex items-center justify-center flex-shrink-0">
              <svg class="w-6 h-6 text-emerald-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
              </svg>
            </div>
            <div class="flex-1 min-w-0">
              <div class="font-semibold text-[#1E293B] text-sm">PB/算法/托管申请</div>
              <div class="text-xs text-[#64748B] mt-0.5">机构标准化业务申请入口</div>
            </div>
            <svg class="w-5 h-5 text-[#94A3B8] flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
            </svg>
          </div>
        </a>
      </div>
    </main>

    <footer class="mt-auto w-full bg-white border-t border-gray-200 px-4 py-3 md:px-6 safe-area-inset-bottom">
      <div class="flex items-center gap-3 bg-gray-100 rounded-2xl px-4 py-3">
        <input type="text" class="flex-1 bg-transparent border-0 outline-none text-[#374151] placeholder-gray-400 text-base" placeholder="输入您的问题或选择智能体..." />
        <button class="flex-shrink-0 w-8 h-8 rounded-full bg-gray-300 flex items-center justify-center text-gray-600" aria-label="添加">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
          </svg>
        </button>
      </div>
    </footer>
  </div>
</body>
</html>
