<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>机构经纪超级数字员工 - 北京博达富通基金风险处理</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/common.css">
</head>
<body class="h-screen overflow-hidden bg-gradient-to-b from-white to-slate-100/40">
  <div class="h-full flex flex-col w-full max-w-4xl mx-auto min-w-0">
    <!-- 顶部导航栏 - 与子页面统一 -->
    <header class="subpage-header">
      <div class="subpage-header-inner">
        <div class="flex items-center gap-1">
          <a href="index.html" class="subpage-header-btn" title="返回员工端">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
            </svg>
          </a>
          <a href="组织者-index.html" class="text-xs text-slate-500 hover:text-indigo-600 px-2 py-1 rounded transition-colors" title="返回组织者首页">组织者</a>
        </div>
        <h1 class="subpage-header-title">博达富通 · 风险处理</h1>
        <button class="subpage-header-btn" aria-label="通知">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- 对话区 -->
    <main id="main-content" class="flex-1 min-h-0 flex flex-col gap-4 px-4 py-4 pb-28 sm:px-5 md:px-6 md:py-6 min-w-0 overflow-x-hidden overflow-y-auto" style="scrollbar-gutter: stable">

      <!-- 时间戳 -->
      <div class="flex items-center justify-center text-xs text-slate-500 bg-white/80 backdrop-blur-sm rounded-full px-3 py-1.5 shadow-sm w-fit mx-auto border border-slate-100">
        今天 09:00
      </div>

      <!-- 1. 超级数字员工：查询请求 -->
      <div class="flex items-start gap-2 message-enter flex-row-reverse">
        <div class="w-8 h-8 rounded-full user-avatar flex items-center justify-center flex-shrink-0 mt-1">
          <svg class="w-5 h-5 text-white" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd"/></svg>
        </div>
        <div class="flex-1 flex flex-col items-end min-w-0">
          <div class="text-xs text-slate-500 mb-1 mr-1">机构经纪超级数字员工</div>
          <div class="bg-indigo-50/80 border border-indigo-100 rounded-xl px-4 py-3 msg-card-shadow max-w-[90%] sm:max-w-[85%]">
            <p class="text-sm text-slate-700">查询北京博达富通基金在我司产品交易情况</p>
          </div>
        </div>
      </div>

      <!-- 2. 公司自动驾驶大模型：返回查询结果 -->
      <div class="flex items-start gap-2 message-enter">
        <div class="w-8 h-8 rounded-full model-avatar flex items-center justify-center flex-shrink-0 mt-1">
          <svg class="w-5 h-5 text-white" fill="currentColor" viewBox="0 0 20 20"><path d="M13 7H7v6h6V7z"/><path fill-rule="evenodd" d="M7 2a1 1 0 012 0v1a7 7 0 014.95 11.95l1.414-1.414A5 5 0 0017 8V3a1 1 0 10-2 0v5a5 5 0 01-8.485 4.485L5.05 12.95A7 7 0 017 2z" clip-rule="evenodd"/></svg>
        </div>
        <div class="flex-1 min-w-0">
          <div class="text-xs text-indigo-600 font-medium mb-1 ml-1">公司自动驾驶大模型</div>
          <div class="bg-white rounded-xl px-4 py-3 msg-card-shadow max-w-[90%] sm:max-w-[85%] border border-slate-100">
            <p class="text-sm font-semibold text-slate-800 mb-3">北京博达富通基金在我司产品交易情况</p>
            <div class="space-y-2">
              <div class="flex items-center justify-between p-3 bg-emerald-50 rounded-lg border border-emerald-100">
                <span class="text-sm font-medium text-slate-800">博达全天候1号</span>
                <span class="text-xs font-semibold text-emerald-600 px-2.5 py-1 rounded-lg bg-white border border-emerald-200">交易正常</span>
              </div>
              <div class="flex items-center justify-between p-3 bg-red-50 rounded-lg border border-red-100">
                <span class="text-sm font-medium text-slate-800">博达全天候2号</span>
                <span class="text-xs font-semibold text-red-600 px-2.5 py-1 rounded-lg bg-white border border-red-200">限制交易</span>
              </div>
            </div>
          </div>
        </div>
      </div>

    </main>

    <!-- 底部输入栏 - 与 index.html 一致 -->
    <footer class="subpage-footer flex-shrink-0">
      <div class="subpage-footer-inner">
        <div class="subpage-footer-btns">
          <a href="员工-高净值客户经纪.html" class="subpage-footer-btn">
            <img src="images/icons/icon-footer-users.svg" alt="">
            <span>高净值客户经纪</span>
          </a>
          <a href="员工-金融产品经纪.html" class="subpage-footer-btn">
            <img src="images/icons/icon-footer-wallet.svg" alt="">
            <span>金融产品经纪</span>
          </a>
          <a href="员工-金融机构经纪.html" class="subpage-footer-btn">
            <img src="images/icons/icon-footer-building.svg" alt="">
            <span>金融机构经纪</span>
          </a>
        </div>
        <div class="subpage-footer-input-wrap">
          <input type="text" class="subpage-footer-input" placeholder="请输入您的问题或选择智能体" autocomplete="off" />
          <button type="button" class="subpage-footer-send-btn" aria-label="发送">
            <img src="images/icons/icon-footer-send.svg" alt="">
          </button>
        </div>
      </div>
    </footer>
  </div>

  <script>
    var mainContent = document.getElementById('main-content');

    function aiAvatar() {
      return '<div class="w-8 h-8 rounded-full ai-avatar flex items-center justify-center flex-shrink-0 mt-1" style="background:linear-gradient(135deg,#667eea,#764ba2);box-shadow:0 4px 15px rgba(102,126,234,.3);">' +
        '<svg class="w-5 h-5 text-white" fill="currentColor" viewBox="0 0 24 24">' +
          '<path d="M12 2C10.9 2 10 2.9 10 4c0 .74.4 1.38 1 1.73V7h-1c-1.1 0-2 .9-2 2v1H6c-.55 0-1 .45-1 1v3c0 .55.45 1 1 1h1v1c0 1.1.9 2 2 2h6c1.1 0 2-.9 2-2v-1h1c.55 0 1-.45 1-1v-3c0-.55-.45-1-1-1h-2V9c0-1.1-.9-2-2-2h-1V5.73c.6-.35 1-.99 1-1.73 0-1.1-.9-2-2-2z"/>' +
          '<circle cx="9" cy="11" r="1"/><circle cx="15" cy="11" r="1"/>' +
          '<path d="M12 15c.83 0 1.5-.67 1.5-1.5S12.83 12 12 12s-1.5.67-1.5 1.5.67 1.5 1.5 1.5z"/>' +
        '</svg>' +
      '</div>';
    }

    function msgWrap(label, content) {
      return '<div class="flex items-start gap-2 message-enter">' +
        aiAvatar() +
        '<div class="flex-1">' +
          '<div class="text-xs text-slate-500 mb-1 ml-1">' + label + '</div>' +
          '<div class="bg-white rounded-xl px-4 py-3 msg-card-shadow max-w-[90%] sm:max-w-[85%] text-sm text-slate-600 leading-relaxed border border-slate-100">' +
            content +
          '</div>' +
        '</div>' +
      '</div>';
    }

    function userMsgWrap(label, content) {
      return '<div class="flex items-start gap-2 message-enter flex-row-reverse">' +
        '<div class="w-8 h-8 rounded-full user-avatar flex items-center justify-center flex-shrink-0 mt-1" style="background:linear-gradient(135deg,#0ea5e9,#06b6d4);box-shadow:0 4px 15px rgba(14,165,233,.3);">' +
          '<svg class="w-5 h-5 text-white" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd"/></svg>' +
        '</div>' +
        '<div class="flex-1 flex flex-col items-end">' +
          '<div class="text-xs text-slate-500 mb-1 mr-1">' + label + '</div>' +
          '<div class="bg-indigo-50/80 border border-indigo-100 rounded-xl px-4 py-3 msg-card-shadow max-w-[90%] sm:max-w-[85%] text-sm text-slate-600 leading-relaxed">' +
            content +
          '</div>' +
        '</div>' +
      '</div>';
    }

    function scrollToBottom() {
      setTimeout(function() {
        var el = document.getElementById('main-content');
        if (el) el.scrollTo({ top: el.scrollHeight, behavior: 'smooth' });
      }, 100);
    }

    function addMsg(html) {
      var el = document.createElement('div');
      el.innerHTML = html;
      mainContent.appendChild(el);
      scrollToBottom();
      return el;
    }

    var deps = ['财富管理业务支持中心','机构经纪部','风险管理部','合规与法律事务部','信息技术部','运维中心'];

    setTimeout(function() {
      // 3. 超级数字员工：请求发起圆桌会议
      addMsg(userMsgWrap('机构经纪超级数字员工',
        '<div class="text-sm text-slate-600">请求发起圆桌会议</div>'
      ));

      setTimeout(function() {
        // 4. 机构经纪组织者智能体：收到请求，拉起圆桌会议
        addMsg(msgWrap('机构经纪组织者智能体',
          '<div class="text-sm text-slate-600 leading-relaxed">收到您的请求，<span class="font-semibold text-indigo-600">已拉起圆桌会议</span>，并协同多部门进行风险处置。</div>'
        ));

        setTimeout(function() {
          // 5. 相关组织者智能体反馈风险处置意见
        addMsg(msgWrap('机构经纪组织者智能体',
          '<div class="flex items-center gap-2 mb-3">' +
            '<span class="font-semibold text-slate-800 text-sm">🔄 圆桌会议 · 风险处置意见</span>' +
            '<span class="bg-indigo-500 text-white text-xs font-medium px-2 py-0.5 rounded-lg">已反馈</span>' +
          '</div>' +
          '<div class="space-y-2.5">' +
            '<div class="flex items-start gap-3 p-3 bg-red-50 rounded-lg border border-red-100">' +
              '<div class="flex-shrink-0 w-9 h-9 rounded-lg bg-gradient-to-br from-red-500 to-red-600 flex items-center justify-center text-white text-lg">⚠️</div>' +
              '<div class="flex-1 min-w-0"><p class="text-xs font-bold text-slate-800 mb-1">风险管理组织者智能体</p><p class="text-xs text-slate-600 leading-relaxed">下一个交易日密切监测其交易行为，在保证交易策略的前提下，严格限制其交易速率和报单笔数。</p></div>' +
            '</div>' +
            '<div class="flex items-start gap-3 p-3 bg-red-50 rounded-lg border border-red-100">' +
              '<div class="flex-shrink-0 w-9 h-9 rounded-lg bg-gradient-to-br from-red-500 to-red-600 flex items-center justify-center text-white text-lg">📋</div>' +
              '<div class="flex-1 min-w-0"><p class="text-xs font-bold text-slate-800 mb-1">机构经纪组织者智能体</p><p class="text-xs text-slate-600 leading-relaxed">由客户经理与博达富通提前做好沟通，说明限制原因及后续安排。</p></div>' +
            '</div>' +
          '</div>'
        ));

          setTimeout(function() {
            // 6. 创建易信会议，通知部门
          addMsg(msgWrap('机构经纪组织者智能体',
            '<div class="flex items-center gap-2 mb-3">' +
              '<span class="font-semibold text-slate-800 text-sm">📞 易信会议</span>' +
              '<span class="bg-indigo-500 text-white text-xs font-medium px-2 py-0.5 rounded-lg">已创建</span>' +
            '</div>' +
            '<div class="text-sm text-slate-600 mb-2">已创建易信会议，通知以下部门相关负责人及经办人召开线上会议，对风险处置意见进行确认：</div>' +
            '<ul class="space-y-1.5 text-sm text-slate-600">' +
              deps.map(function(d){ return '<li class="flex items-center gap-1.5"><span class="w-1.5 h-1.5 rounded-full bg-indigo-500 flex-shrink-0"></span>' + d + '</li>'; }).join('') +
            '</ul>'
          ));

            setTimeout(function() {
              // 7. 对风险处置意见进行确认
            addMsg(msgWrap('机构经纪组织者智能体',
              '<div class="flex items-center gap-2 mb-2">' +
                '<span class="font-semibold text-slate-800 text-sm">✅ 风险处置意见确认</span>' +
                '<span class="bg-emerald-500 text-white text-xs font-medium px-2 py-0.5 rounded-lg">已确认</span>' +
              '</div>' +
              '<div class="text-sm text-slate-600 mb-2">参会部门已对风险处置意见进行确认，会议决策如下：</div>' +
              '<ul class="space-y-2 text-sm text-slate-600">' +
                '<li class="flex items-start gap-1.5"><span class="w-1.5 h-1.5 rounded-full bg-indigo-500 flex-shrink-0 mt-1.5"></span>下一个交易日密切监测其交易行为</li>' +
                '<li class="flex items-start gap-1.5"><span class="w-1.5 h-1.5 rounded-full bg-indigo-500 flex-shrink-0 mt-1.5"></span>在保证交易策略的前提下，严格限制其交易速率和报单笔数</li>' +
                '<li class="flex items-start gap-1.5"><span class="w-1.5 h-1.5 rounded-full bg-indigo-500 flex-shrink-0 mt-1.5"></span>由客户经理与博达富通提前做好沟通</li>' +
              '</ul>'
            ));

              setTimeout(function() {
                // 8. 形成会议纪要
              addMsg(msgWrap('机构经纪组织者智能体',
                '<div class="flex items-center gap-2 mb-2">' +
                  '<span class="font-semibold text-slate-800 text-sm">📝 会议纪要</span>' +
                  '<span class="bg-indigo-500 text-white text-xs font-medium px-2 py-0.5 rounded-lg">已完成</span>' +
                '</div>' +
                '<div class="text-sm text-slate-600">机构经纪组织者智能体已完成会议纪要，记录风险处置意见及会议决策。</div>'
              ));

                setTimeout(function() {
                  // 9. 发送参会人确认
                addMsg(msgWrap('机构经纪组织者智能体',
                  '<div class="flex items-center gap-2 mb-2">' +
                    '<span class="font-semibold text-slate-800 text-sm">📤 发送参会人确认</span>' +
                    '<span class="bg-emerald-500 text-white text-xs font-medium px-2 py-0.5 rounded-lg">已发送</span>' +
                  '</div>' +
                  '<div class="text-sm text-slate-600">会议纪要已同步发送参会人确认，抄送公司分管领导。</div>'
                ));

                  setTimeout(function() {
                    addMsg('<div class="flex flex-col gap-2 py-4 px-4 bg-gradient-to-r from-green-50 to-emerald-50 rounded-xl border border-green-200 message-enter">' +
                      '<div class="flex items-center gap-2">' +
                        '<svg class="w-5 h-5 text-green-600" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/></svg>' +
                        '<span class="font-medium text-green-700 text-sm">风险处置流程已完成</span>' +
                      '</div>' +
                      '<p class="text-sm text-slate-600">圆桌会议已结束，处置意见已确认并发送。客户经理将按会议决策与博达富通沟通。</p>' +
                    '</div>');
                  }, 800);
                }, 1800);
              }, 2000);
            }, 2000);
          }, 2200);
        }, 2000);
      }, 1500);
    }, 800);
  </script>
</body>
</html>
