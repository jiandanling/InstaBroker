<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>专户代销与托管协同 - 请示事项</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: #f5f5f5;
    }
    .card-shadow { box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08); }
  </style>
</head>
<body class="min-h-screen">
  <div class="min-h-screen flex flex-col max-w-lg mx-auto bg-[#f5f5f5]">

    <header class="sticky top-0 bg-white px-4 py-3 flex items-center justify-between z-20 border-b border-gray-100">
      <a href="组织者-请示事项.html" class="w-10 h-10 flex items-center justify-center text-gray-700">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
        </svg>
      </a>
      <h1 class="text-base font-semibold text-[#4f46e5]">请示事项</h1>
      <button class="w-10 h-10 flex items-center justify-center text-gray-700">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
        </svg>
      </button>
    </header>

    <main class="flex-1 overflow-auto px-4 py-4 pb-24 space-y-3">
      <div class="bg-white rounded-2xl card-shadow p-4 space-y-4">
        <div class="flex items-center justify-between">
          <span class="text-xs font-medium text-[#0891b2] bg-cyan-50 border border-cyan-200 rounded-full px-2.5 py-1">业务协同</span>
          <span class="text-xs font-medium text-[#f97316] bg-orange-50 border border-orange-200 rounded-full px-2.5 py-1">待处理</span>
        </div>
        <p class="text-xs text-[#64748B]">广州分公司 · 前端发起 · 5小时前</p>
        <h2 class="text-sm font-bold text-[#1E293B] leading-snug">高净值客户专户代销与托管协同需求</h2>
        <p class="text-sm text-[#64748B] leading-relaxed">业务协同：客户拟通过我司开展专户产品代销及托管合作，需财富、托管、合规等多部门协同评估准入与合同条款。</p>
        <div class="pt-3 border-t border-gray-100">
          <p class="text-xs font-semibold text-[#1E293B] mb-2">拟协同部门</p>
          <div class="flex flex-wrap gap-2">
            <span class="px-2.5 py-1 rounded-lg bg-gray-100 text-xs text-[#4B5563]">财富管理 · 代销</span>
            <span class="px-2.5 py-1 rounded-lg bg-gray-100 text-xs text-[#4B5563]">托管部</span>
            <span class="px-2.5 py-1 rounded-lg bg-gray-100 text-xs text-[#4B5563]">合规</span>
          </div>
        </div>
        <p class="text-[11px] text-[#9CA3AF]">该事项尚未分配，组织者将根据前端请示顺序安排协同推进。</p>
      </div>
    </main>

    <footer class="sticky bottom-0 bg-white border-t border-gray-100 px-4 py-3">
      <div class="flex items-center gap-3 bg-gray-100 rounded-2xl px-4 py-3">
        <button class="flex-shrink-0 text-gray-500" aria-label="图片">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
          </svg>
        </button>
        <input type="text" class="flex-1 bg-transparent border-0 outline-none text-[#374151] placeholder-gray-400 text-sm" placeholder="输入您的问题或选择智能体..." />
        <button class="flex-shrink-0 w-8 h-8 rounded-full bg-gray-300 flex items-center justify-center text-gray-600" aria-label="添加">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
          </svg>
        </button>
      </div>
    </footer>
  </div>
</body>
</html>
