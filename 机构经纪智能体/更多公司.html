        function getStage() {
          var s = "";

          // ① 优先从 SPA 记录的当前子页面 URL 中解析（例如 "更多公司.html?stage=yewu"）
          var rawUrl = (window.__InstaBrokerCurrentPageUrl || "").toString();
          if (rawUrl) {
            var qIndex = rawUrl.indexOf("?");
            if (qIndex >= 0) {
              var innerSearch = rawUrl.slice(qIndex + 1);
              var innerParams = new URLSearchParams(innerSearch);
              s = (innerParams.get("stage") || "").toLowerCase();
            }
          }

          // ② 如果还没有，尝试从外层 URL 的 search 中解析（兼容直接访问更多公司.html?stage=xxx）
          if (!s) {
            var params = new URLSearchParams(window.location.search || "");
            s = (params.get("stage") || "").toLowerCase();

            // ③ 如果仍然没有，再从 page 参数里解析（例如 page=更多公司.html%3Fstage%3Dyewu）
            if (!s) {
              var pageParam = params.get("page") || "";
              if (pageParam) {
                try {
                  // 一次或多次解码，兼容被多重 encode 的情况
                  var decoded = decodeURIComponent(pageParam);
                  if (decoded !== pageParam) {
                    try {
                      decoded = decodeURIComponent(decoded);
                    } catch (e2) {
                      // 二次解码失败则忽略，继续用第一次结果
                    }
                  }

                  var qIndex2 = decoded.indexOf("?");
                  if (qIndex2 >= 0) {
                    var innerSearch2 = decoded.slice(qIndex2 + 1);
                    var innerParams2 = new URLSearchParams(innerSearch2);
                    s = (innerParams2.get("stage") || "").toLowerCase();
                  }

                  if (!s) {
                    var regex = /stage(?:%3D|=)([a-zA-Z]+)/i;
                    var m = decoded.match(regex) || pageParam.match(regex);
                    if (m && m[1]) {
                      s = m[1].toLowerCase();
                    }
                  }
                } catch (e) {
                  // ignore decode errors, fallback to default
                }
              }
            }
          }

          return stageMap[s] ? s : "tuoke";
        }

              '<div class="index-card-task text-violet-500">任务：落实交易情况，形成书面说明并回复问询</div>' +
              '<div class="text-slate-600 text-xs font-medium">' +
              '<div class="flex items-center gap-1.5"><svg class="index-icon-small" aria-hidden="true"><use xlink:href="images/index-icons.svg#icon-bolt"></use></svg>' +
              "<span>智能体可为您定制：</span></div>" +
              '<div class="flex flex-wrap items-center gap-1.5 mt-1">' +
              '<span class="index-material-pill index-material-pill--violet" title="交易异常分析框架与问询回复模板">交易异常分析框架与问询回复模板</span>' +
              "</div></div>" +
              '<div class="index-task-card-footer footer-right">' +
              '<span class="index-task-card-action text-violet-600 text-opacity-70">立即处理 →</span>' +
              "</div></div></li>";
            return;
          }

          var list = companiesByStage[stageId] || companiesByStage.tuoke;
          ul.innerHTML = list
            .map(function (c) {
              var sourceHtml = c.source
                ? '<div class="index-task-card-source">' + c.source + "</div>"
                : "";
              var href = c.link
                ? ' href="' + c.link + '"'
                : ' href="#" onclick="return false;"';
              return (
                '<li class="more-company-item rounded-xl border border-slate-200 bg-white p-4 shadow-sm hover:shadow-md hover:border-slate-300 transition-all">' +
                '<a class="block" ' +
                href +
                ">" +
                '<div class="font-bold text-slate-900 text-sm">' +
                c.name +
                "</div>" +
                '<div class="index-task-card-subline mt-1">' +
                c.subline +
                "</div>" +
                sourceHtml +
                '<div class="text-slate-600 leading-relaxed text-sm mt-2 index-card-desc">' +
                c.desc +
                "</div>" +
                '<div class="mt-3 flex justify-end">' +
                '<span class="index-task-card-action text-indigo-600">立即处理 →</span>' +
                "</div>" +
                "</a></li>"
              );
            })
            .join("");
        }

        var stage = getStage();

        // 根据阶段动态设置页面标题、列表标题和外层头部标题
        if (stageMap[stage]) {
          document.title = stageMap[stage].label;
          // 顶部导航栏显示当前阶段对应文案；延迟执行以免被 index 的 updateHeaderTitle 覆盖
          var label = stageMap[stage].label;
          var headerTitleEl = document.getElementById("pageHeaderTitle");
          if (headerTitleEl) {
            headerTitleEl.textContent = label;
          }
          setTimeout(function () {
            var el = document.getElementById("pageHeaderTitle");
            if (el) el.textContent = label;
          }, 0);
        }

        renderTaskCard(stage);
        renderCompanyList(stage);
      })();
    </script>
  </body>
</html>
