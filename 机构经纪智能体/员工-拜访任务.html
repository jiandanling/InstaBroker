<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>员工端-拜访任务</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/common.css">
</head>
<body class="h-screen overflow-hidden bg-gradient-to-b from-white to-slate-100/40">
  <div class="subpage-layout h-full">
    <!-- 顶部导航栏 - 与超级员工index风格一致 -->
    <header class="subpage-header">
      <div class="subpage-header-inner">
        <a href="index.html" class="subpage-header-btn" aria-label="返回">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
          </svg>
        </a>
        <h1 class="subpage-header-title">拜访任务</h1>
        <button class="subpage-header-btn" aria-label="通知">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
          </svg>
        </button>
      </div>
    </header>

    <main class="subpage-main flex flex-col gap-4">
      <!-- 智能体推送推荐卡片 -->
      <div class="flex items-start gap-2 min-w-0">
        <div class="w-8 h-8 rounded-full ai-avatar flex items-center justify-center mt-1">
          <svg class="w-5 h-5 text-white" fill="currentColor" viewBox="0 0 24 24">
            <path d="M12 2C10.9 2 10 2.9 10 4c0 .74.4 1.38 1 1.73V7h-1c-1.1 0-2 .9-2 2v1H6c-.55 0-1 .45-1 1v3c0 .55.45 1 1 1h1v1c0 1.1.9 2 2 2h6c1.1 0 2-.9 2-2v-1h1c.55 0 1-.45 1-1v-3c0-.55-.45-1-1-1h-2V9c0-1.1-.9-2-2-2h-1V5.73c.6-.35 1-.99 1-1.73 0-1.1-.9-2-2-2z"/>
            <circle cx="9" cy="11" r="1"/>
            <circle cx="15" cy="11" r="1"/>
            <path d="M12 15c.83 0 1.5-.67 1.5-1.5S12.83 12 12 12s-1.5.67-1.5 1.5.67 1.5 1.5 1.5z"/>
          </svg>
        </div>
        <div class="flex-1 min-w-0">
          <!-- 拜访任务卡片 -->
          <div class="gradient-border card-hover hover:shadow-lg transition-shadow">
            <div class="p-4 flex flex-col gap-3">
              <!-- 标题行：任务名称 -->
              <div class="flex items-center gap-2">
                <div class="w-6 h-6 bg-gradient-to-br from-blue-500 to-purple-600 rounded flex items-center justify-center shadow-md flex-shrink-0">
                  <svg class="w-4 h-4 text-white" fill="currentColor" viewBox="0 0 20 20">
                    <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z" clip-rule="evenodd"/>
                  </svg>
                </div>
                <span class="font-bold text-[#1E293B] text-base">客户拜访任务</span>
              </div>
              
              <!-- 客户信息区：紧凑横向布局 -->
              <div class="flex items-center gap-3 bg-gradient-to-r from-blue-50 to-purple-50 rounded-lg p-2.5 border border-blue-100">
                <div class="w-10 h-10 rounded-full bg-gradient-to-br from-blue-500 to-purple-600 flex items-center justify-center shadow-md flex-shrink-0">
                  <svg class="w-6 h-6 text-white" fill="currentColor" viewBox="0 0 20 20">
                    <path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd"/>
                  </svg>
                </div>
                <div class="flex-1 min-w-0">
                  <div class="font-bold text-[#1E293B] text-sm leading-tight">北京博达富通基金管理有限公司</div>
                  <div class="text-xs text-[#64748B] mt-0.5">金融机构客户 | 未合作</div>
                </div>
              </div>
              
              <!-- 拜访要点 + 合作机会分析：响应式双列 -->
              <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                <!-- 拜访要点 -->
                <div class="bg-gradient-to-r from-blue-50 to-indigo-50 border-l-4 border-blue-400 p-2.5 rounded-lg shadow-sm">
                  <div class="font-medium text-[#1E293B] text-xs mb-2">拜访要点</div>
                  <div class="space-y-1.5">
                    <div class="flex items-center gap-2 task-item">
                      <div class="w-1.5 h-1.5 bg-blue-600 rounded-full flex-shrink-0"></div>
                      <span class="text-sm text-blue-600 font-medium">邀约客户，确定拜访时间</span>
                    </div>
                    <div class="flex items-center gap-2 task-item">
                      <div class="w-1.5 h-1.5 bg-blue-600 rounded-full flex-shrink-0"></div>
                      <span class="text-sm text-blue-600 font-medium">了解客户需求</span>
                    </div>
                  </div>
                </div>
                <!-- 合作机会分析 -->
                <div class="bg-white/50 rounded-lg p-2.5 border border-gray-100">
                  <div class="font-medium text-[#1E293B] text-xs mb-2">合作机会分析</div>
                  <div class="text-sm text-[#374151] space-y-1">
                    <div class="flex items-start gap-1.5">
                      <span class="text-blue-600 font-bold flex-shrink-0">•</span>
                      <span><strong>代销服务</strong> - 过往业绩优秀，合作后可推代销</span>
                    </div>
                    <div class="flex items-start gap-1.5">
                      <span class="text-blue-600 font-bold flex-shrink-0">•</span>
                      <span><strong>极速交易系统</strong> - 量化策略对时延要求高</span>
                    </div>
                    <div class="flex items-start gap-1.5">
                      <span class="text-blue-600 font-bold flex-shrink-0">•</span>
                      <span><strong>两融</strong> - 匹配融资融券，提升资金利用率</span>
                    </div>
                    <div class="flex items-start gap-1.5">
                      <span class="text-blue-600 font-bold flex-shrink-0">•</span>
                      <span><strong>投研</strong> - 优化决策、规避风险</span>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
          
          <!-- 文件下载区 -->
          <div class="flex flex-col gap-2 mt-3">
            <div class="flex items-start mt-0">
              <div class="flex-1 min-w-0">
                <div class="bg-gradient-to-r from-blue-50 to-purple-50 rounded-xl px-4 py-3 flex items-center gap-3 shadow-lg border border-blue-100 card-hover hover:shadow-lg transition-shadow">
                  <svg class="w-7 h-7 text-[#2563EB] flex-shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <rect x="4" y="2" width="16" height="20" rx="2" fill="#fff" stroke="#2563EB"/>
                    <path d="M8 6h8M8 10h8M8 14h4" stroke="#2563EB" stroke-width="1.5" stroke-linecap="round"/>
                    <rect x="7" y="17" width="6" height="2" rx="1" fill="#2563EB"/>
                  </svg>
                  <div class="flex-1 min-w-0">
                    <div class="text-sm text-[#1E293B] font-bold truncate">华创机构经纪业务一页纸.pdf</div>
                    <div class="text-xs text-[#64748B] mt-0.5">PDF文件 · 1.2MB</div>
                  </div>
                  <a href="#" class="text-[#2563EB] text-sm font-bold hover:underline transition bg-white px-3 py-1 rounded-lg shadow-sm">下载</a>
                </div>
              </div>
            </div>
            
            <div class="flex items-start mt-2">
              <div class="flex-1 min-w-0">
                <div class="bg-gradient-to-r from-green-50 to-blue-50 rounded-xl px-4 py-3 flex items-center gap-3 shadow-lg border border-green-100 card-hover hover:shadow-lg transition-shadow">
                  <svg class="w-7 h-7 text-[#2563EB] flex-shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <rect x="4" y="2" width="16" height="20" rx="2" fill="#fff" stroke="#2563EB"/>
                    <path d="M8 6h8M8 10h8M8 14h4" stroke="#2563EB" stroke-width="1.5" stroke-linecap="round"/>
                    <rect x="7" y="17" width="6" height="2" rx="1" fill="#2563EB"/>
                  </svg>
                  <div class="flex-1 min-w-0">
                    <div class="text-sm text-[#1E293B] font-bold truncate">北京博达富通基金管理有限公司拜访提纲.pdf</div>
                    <div class="text-xs text-[#64748B] mt-0.5">PDF文件 · 0.6MB</div>
                  </div>
                  <a href="#" class="text-[#2563EB] text-sm font-bold hover:underline transition bg-white px-3 py-1 rounded-lg shadow-sm">下载</a>
                </div>
              </div>
            </div>          
          </div>
        </div>
      </div>
    </main>
    
    <!-- 底部输入栏 - 与超级员工index一致 -->
    <footer class="subpage-footer flex-shrink-0">
      <div class="subpage-footer-inner">
        <div class="subpage-footer-btns">
          <a href="员工-高净值客户经纪.html" class="subpage-footer-btn">
            <img src="images/icons/icon-footer-users.svg" alt="">
            <span>高净值客户经纪</span>
          </a>
          <a href="员工-金融产品经纪.html" class="subpage-footer-btn">
            <img src="images/icons/icon-footer-wallet.svg" alt="">
            <span>金融产品经纪</span>
          </a>
          <a href="员工-金融机构经纪.html" class="subpage-footer-btn">
            <img src="images/icons/icon-footer-building.svg" alt="">
            <span>金融机构经纪</span>
          </a>
        </div>
        <div class="subpage-footer-input-wrap">
          <input type="text" class="subpage-footer-input" placeholder="请输入您的问题或选择智能体" autocomplete="off" />
          <button type="button" class="subpage-footer-send-btn" aria-label="发送">
            <img src="images/icons/icon-footer-send.svg" alt="">
          </button>
        </div>
      </div>
    </footer>
  </div>
</body>
</html>
