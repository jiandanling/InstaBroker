<!DOCTYPE html>

    <main class="subpage-main">

      <div class="flex flex-col items-center mb-6">

      <div class="space-y-3">

          <div class="p-4 flex items-center gap-4">

              <svg class="w-6 h-6 text-violet-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">

              <div class="text-xs text-[#64748B] mt-0.5">TradeX、FixStation、恒生PB等</div>
            </div>
            <svg class="w-5 h-5 text-[#94A3B8] flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">

              <svg class="w-6 h-6 text-violet-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/>

            </div>

              <div class="text-xs text-[#64748B] mt-0.5">量化交易、智能算法接入</div>
            </div>
            <svg class="w-5 h-5 text-[#94A3B8] flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
