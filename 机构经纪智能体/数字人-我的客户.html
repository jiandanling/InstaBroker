<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>我的客户</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/common.css" />
    <script src="js/spa-wrapper.js"></script>
  </head>
  <body>
    <main class="subpage-main">
      <div class="visit-page-root">
        <h2 class="subpage-section-title mb-4">
          <span class="w-1 h-3.5 rounded-full bg-indigo-500"></span>
          客户概览
        </h2>
        <!-- 统计概览 -->
        <div class="grid grid-cols-3 gap-3 mb-5">
          <div
            class="bg-white rounded-xl subpage-card-shadow px-4 py-3.5 text-center hover:shadow-md transition-shadow"
          >
            <div class="text-xs text-[#64748B]">全部客户</div>
            <div class="text-lg font-bold text-[#1E293B] mt-0.5">12</div>
          </div>
          <div
            class="bg-white rounded-xl subpage-card-shadow px-4 py-3.5 text-center hover:shadow-md transition-shadow"
          >
            <div class="text-xs text-[#64748B]">跟进中</div>
            <div class="text-lg font-bold text-[#2563eb] mt-0.5">5</div>
          </div>
          <div
            class="bg-white rounded-xl subpage-card-shadow px-4 py-3.5 text-center hover:shadow-md transition-shadow"
          >
            <div class="text-xs text-[#64748B]">已合作</div>
            <div class="text-lg font-bold text-[#059669] mt-0.5">3</div>
          </div>
        </div>

        <!-- 客户列表（点击进入客户分析报告） -->
        <h2 class="subpage-section-title mb-3 mt-6">
          <span class="w-1 h-3.5 rounded-full bg-indigo-500"></span>
          客户列表
        </h2>
        <div class="space-y-3">
          <!-- 幻方量化 -->
          <a
            href="客户分析报告-幻方量化.html"
            class="block bg-white rounded-xl subpage-card-shadow overflow-hidden hover:shadow-lg transition-shadow"
          >
            <div class="p-4 flex items-center gap-4">
              <div
                class="w-12 h-12 rounded-xl bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center flex-shrink-0 text-white font-bold text-sm"
              >
                幻
              </div>
              <div class="flex-1 min-w-0">
                <div class="font-semibold text-[#1E293B] text-sm">
                  幻方量化
                </div>
                <div class="text-xs text-[#64748B] mt-0.5">
                  金融机构客户 | 量化私募第一梯队，约600亿
                </div>
                <div class="flex flex-wrap gap-1.5 mt-2">
                  <span
                    class="px-2 py-0.5 rounded-full bg-[#e0e7ff] text-[#4f46e5] text-xs"
                    >推荐客户</span
                  >
                </div>
              </div>
              <svg
                class="w-5 h-5 text-[#94A3B8] flex-shrink-0"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M9 5l7 7-7 7"
                />
              </svg>
            </div>
          </a>

          <!-- 九坤投资 -->
          <a
            href="客户分析报告-九坤投资.html"
            class="block bg-white rounded-xl subpage-card-shadow overflow-hidden hover:shadow-lg transition-shadow"
          >
            <div class="p-4 flex items-center gap-4">
              <div
                class="w-12 h-12 rounded-xl bg-gradient-to-br from-blue-500 to-indigo-600 flex items-center justify-center flex-shrink-0 text-white font-bold text-sm"
              >
                九
              </div>
              <div class="flex-1 min-w-0">
                <div class="font-semibold text-[#1E293B] text-sm">
                  九坤投资
                </div>
                <div class="text-xs text-[#64748B] mt-0.5">
                  金融机构客户 | 头部量化私募
                </div>
                <div class="flex flex-wrap gap-1.5 mt-2">
                  <span
                    class="px-2 py-0.5 rounded-full bg-[#dbeafe] text-[#2563eb] text-xs"
                    >推荐客户</span
                  >
                </div>
              </div>
              <svg
                class="w-5 h-5 text-[#94A3B8] flex-shrink-0"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M9 5l7 7-7 7"
                />
              </svg>
            </div>
          </a>

          <!-- 明汯投资 -->
          <a
            href="客户分析报告-明汯投资.html"
            class="block bg-white rounded-xl subpage-card-shadow overflow-hidden hover:shadow-lg transition-shadow"
          >
            <div class="p-4 flex items-center gap-4">
              <div
                class="w-12 h-12 rounded-xl bg-gradient-to-br from-emerald-500 to-teal-600 flex items-center justify-center flex-shrink-0 text-white font-bold text-sm"
              >
                明
              </div>
              <div class="flex-1 min-w-0">
                <div class="font-semibold text-[#1E293B] text-sm">明汯投资</div>
                <div class="text-xs text-[#64748B] mt-0.5">
                  金融机构客户 | 已认可服务方案，规模超500亿
                </div>
                <div class="flex flex-wrap gap-1.5 mt-2">
                  <span
                    class="px-2 py-0.5 rounded-full bg-[#ecfdf5] text-[#059669] text-xs"
                    >推荐客户</span
                  >
                </div>
              </div>
              <svg
                class="w-5 h-5 text-[#94A3B8] flex-shrink-0"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M9 5l7 7-7 7"
                />
              </svg>
            </div>
          </a>
        </div>
      </div>
    </main>
  </body>
</html>
