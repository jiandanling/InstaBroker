<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>员工端-我的客户</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/common.css">
</head>
<body class="h-screen overflow-hidden bg-gradient-to-b from-white to-slate-100/40">
  <div class="subpage-layout h-full">
    <header class="subpage-header">
      <div class="subpage-header-inner">
        <a href="index.html" class="subpage-header-btn" aria-label="返回">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
          </svg>
        </a>
        <h1 class="subpage-header-title">我的客户</h1>
        <button class="subpage-header-btn" aria-label="通知">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
          </svg>
        </button>
      </div>
    </header>

    <main class="subpage-main">
      <h2 class="subpage-section-title mb-4">
        <span class="w-1 h-3.5 rounded-full bg-indigo-500"></span>
        客户概览
      </h2>
      <!-- 统计概览 -->
      <div class="grid grid-cols-3 gap-3 mb-5">
        <div class="bg-white rounded-xl subpage-card-shadow px-4 py-3.5 text-center hover:shadow-md transition-shadow">
          <div class="text-xs text-[#64748B]">全部客户</div>
          <div class="text-lg font-bold text-[#1E293B] mt-0.5">12</div>
        </div>
        <div class="bg-white rounded-xl subpage-card-shadow px-4 py-3.5 text-center hover:shadow-md transition-shadow">
          <div class="text-xs text-[#64748B]">跟进中</div>
          <div class="text-lg font-bold text-[#2563eb] mt-0.5">5</div>
        </div>
        <div class="bg-white rounded-xl subpage-card-shadow px-4 py-3.5 text-center hover:shadow-md transition-shadow">
          <div class="text-xs text-[#64748B]">已合作</div>
          <div class="text-lg font-bold text-[#059669] mt-0.5">3</div>
        </div>
      </div>

      <!-- 客户列表 -->
      <h2 class="subpage-section-title mb-3 mt-6">
        <span class="w-1 h-3.5 rounded-full bg-indigo-500"></span>
        客户列表
      </h2>
      <div class="space-y-3">
        <!-- 北京博达富通基金 -->
        <a href="员工-博达富通-客户详情.html" class="block bg-white rounded-xl subpage-card-shadow overflow-hidden hover:shadow-lg transition-shadow">
          <div class="p-4 flex items-center gap-4">
            <div class="w-12 h-12 rounded-xl bg-gradient-to-br from-blue-500 to-purple-600 flex items-center justify-center flex-shrink-0 text-white font-bold text-sm">博</div>
            <div class="flex-1 min-w-0">
              <div class="font-semibold text-[#1E293B] text-sm">北京博达富通基金</div>
              <div class="text-xs text-[#64748B] mt-0.5">金融机构客户 | 管理规模85亿</div>
              <div class="flex flex-wrap gap-1.5 mt-2">
                <span class="px-2 py-0.5 rounded-full bg-[#dbeafe] text-[#2563eb] text-xs">需求对接</span>
                <span class="px-2 py-0.5 rounded-full bg-[#f5f3ff] text-[#7c3aed] text-xs">方案沟通</span>
                <span class="px-2 py-0.5 rounded-full bg-[#ecfdf5] text-[#059669] text-xs">账户开立</span>
              </div>
            </div>
            <svg class="w-5 h-5 text-[#94A3B8] flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
            </svg>
          </div>
        </a>

        <!-- 示例客户2 -->
        <a href="#" class="block bg-white rounded-xl subpage-card-shadow overflow-hidden hover:shadow-lg transition-shadow">
          <div class="p-4 flex items-center gap-4">
            <div class="w-12 h-12 rounded-xl bg-gradient-to-br from-amber-500 to-orange-600 flex items-center justify-center flex-shrink-0 text-white font-bold text-sm">华</div>
            <div class="flex-1 min-w-0">
              <div class="font-semibold text-[#1E293B] text-sm">华创资产管理</div>
              <div class="text-xs text-[#64748B] mt-0.5">金融机构客户 | 管理规模120亿</div>
              <div class="flex flex-wrap gap-1.5 mt-2">
                <span class="px-2 py-0.5 rounded-full bg-[#dbeafe] text-[#2563eb] text-xs">线索跟进</span>
              </div>
            </div>
            <svg class="w-5 h-5 text-[#94A3B8] flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
            </svg>
          </div>
        </a>

        <!-- 示例客户3 -->
        <a href="#" class="block bg-white rounded-xl subpage-card-shadow overflow-hidden hover:shadow-lg transition-shadow">
          <div class="p-4 flex items-center gap-4">
            <div class="w-12 h-12 rounded-xl bg-gradient-to-br from-emerald-500 to-teal-600 flex items-center justify-center flex-shrink-0 text-white font-bold text-sm">正</div>
            <div class="flex-1 min-w-0">
              <div class="font-semibold text-[#1E293B] text-sm">正赢投资</div>
              <div class="text-xs text-[#64748B] mt-0.5">私募机构 | 综合评估中</div>
              <div class="flex flex-wrap gap-1.5 mt-2">
                <span class="px-2 py-0.5 rounded-full bg-[#f5f3ff] text-[#7c3aed] text-xs">圆桌协同</span>
              </div>
            </div>
            <svg class="w-5 h-5 text-[#94A3B8] flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
            </svg>
          </div>
        </a>
      </div>
    </main>

    <!-- 底部：与主界面一致 -->
    <footer class="subpage-footer flex-shrink-0">
      <div class="subpage-footer-inner">
        <div class="subpage-footer-btns">
          <a href="员工-高净值客户经纪.html" class="subpage-footer-btn">
            <svg class="w-3 h-3 sm:w-3.5 sm:h-3.5 text-indigo-500 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20"><path d="M9 6a3 3 0 11-6 0 3 3 0 016 0zM17 6a3 3 0 11-6 0 3 3 0 016 0zM12.93 17c.046-.327.07-.66.07-1a6.97 6.97 0 00-1.5-4.33A5 5 0 0119 16v1h-6.07zM6 11a5 5 0 015 5v1H1v-1a5 5 0 015-5z"/></svg>
            <span>高净值客户经纪</span>
          </a>
          <a href="员工-金融产品经纪.html" class="subpage-footer-btn">
            <svg class="w-3 h-3 sm:w-3.5 sm:h-3.5 text-violet-500 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M4 4a2 2 0 00-2 2v4a2 2 0 002 2V6h10a2 2 0 00-2-2H4zm2 6a2 2 0 012-2h8a2 2 0 012 2v4a2 2 0 01-2 2H8a2 2 0 01-2-2v-4zm6 4a2 2 0 100-4 2 2 0 000 4z" clip-rule="evenodd"/></svg>
            <span>金融产品经纪</span>
          </a>
          <a href="员工-金融机构经纪.html" class="subpage-footer-btn">
            <svg class="w-3 h-3 sm:w-3.5 sm:h-3.5 text-emerald-500 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M4 4a2 2 0 012-2h8a2 2 0 012 2v12a1 1 0 110 2h-3a1 1 0 01-1-1v-2a1 1 0 00-1-1H9a1 1 0 00-1 1v2a1 1 0 01-1 1H4a1 1 0 110-2V4zm3 1h2v2H7V5zm2 4H7v2h2V9zm2-4h2v2h-2V5zm2 4h-2v2h2V9z" clip-rule="evenodd"/></svg>
            <span>金融机构经纪</span>
          </a>
        </div>
        <div class="subpage-footer-input-wrap">
          <input type="text" class="subpage-footer-input" placeholder="请输入您的问题或选择智能体" />
          <button type="button" class="flex-shrink-0 p-1.5 text-slate-500 hover:text-slate-700 transition-colors rounded-full hover:bg-slate-300/50" aria-label="发送">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 10l7-7m0 0l7 7m-7-7v18"/></svg>
          </button>
        </div>
      </div>
    </footer>
  </div>
</body>
</html>
